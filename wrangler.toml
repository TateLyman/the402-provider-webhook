name = "tateprograms-the402-provider"
main = "src/index.js"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "the402.tateprograms.com", custom_domain = true }
]

[vars]
BRAND_NAME = "Tate Programs"
PUBLIC_SITE = "https://tateprograms.com"
FIX_SPRINT_URL = "https://tateprograms.com/x402-fix-sprint.html"
REQUIRE_SIGNATURE = "true"
# Optional public Base mainnet receive address for Agentic Market-compatible x402.
# BASE_PAY_TO = "0x..."
# Private upstream auth for proxy marketplaces that collect payment and forward calls.
# PROVIDER_PROXY_TOKEN = "set as secret, not plain vars"
